<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Albatross Speech Codec</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

.header {
    text-align: center;
    padding: 20px;
    background: #111827;
}

.header img {
    height: 80px;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 12px;
}

input, button, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

textarea {
    height: 120px;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png">
    <h2>Albatross Speech Codec</h2>
</div>

<div class="container">

<!-- ENCODE -->
<div class="card">
    <h3>Encode ? WAV</h3>

    <input id="text" placeholder="Enter text">
    <input id="filename" placeholder="filename.wav (optional)">
    <input id="key" placeholder="key (optional)">

    <button onclick="encode()">Encode & Download</button>

    <audio id="audio" controls></audio>
</div>

<!-- DECODE -->
<div class="card">
    <h3>Decode WAV ? Text</h3>

    <input type="file" id="file" accept=".wav">

    <button onclick="decode()">Decode</button>

    <textarea id="out"></textarea>
</div>

</div>

<script>
const BASE = "https://albatrossspeech.onrender.com";

/* -----------------------
   ENCODE
------------------------ */
async function encode() {
    const text = document.getElementById("text").value;
    const filename = document.getElementById("filename").value || "output.wav";
    const key = document.getElementById("key").value;

    const res = await fetch(BASE + "/encode", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            text: text,
            filename: filename,
            key: key ? parseInt(key) : null
        })
    });

    if (!res.ok) {
        alert(await res.text());
        return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    // audio preview
    document.getElementById("audio").src = url;

    // force download
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
}

/* -----------------------
   DECODE
------------------------ */
async function decode() {
    const file = document.getElementById("file").files[0];

    if (!file) {
        alert("Select WAV file first");
        return;
    }

    const form = new FormData();
    form.append("file", file);

    const res = await fetch(BASE + "/decode", {
        method: "POST",
        body: form
    });

    const data = await res.json();
    document.getElementById("out").value = data.decoded;
}
</script>

</body>
</html>
