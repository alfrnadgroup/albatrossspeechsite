<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Albatross Speech Codec</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

.header {
    text-align: center;
    padding: 30px;
    background: #111827;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 12px;
}

input, button, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
}

textarea {
    height: 120px;
}
</style>
</head>

<body>

<div class="header">
    <h2>?? Albatross Speech Codec</h2>
</div>

<div class="container">

<!-- ENCODE -->
<div class="card">
    <h3>Encode</h3>

    <input id="text" placeholder="Enter text">
    <input id="key" placeholder="Key (optional)">
    <input id="filename" placeholder="filename.wav">

    <button onclick="encode()">Encode</button>

    <audio id="audio" controls></audio>
    <p id="status"></p>
</div>

<!-- DECODE -->
<div class="card">
    <h3>Decode</h3>

    <input type="file" id="file">

    <button onclick="decode()">Decode</button>

    <textarea id="out"></textarea>
</div>

</div>

<script>
const BASE_URL = "https://albatrossspeech.onrender.com";

/* ENCODE */
async function encode() {
    const text = document.getElementById("text").value;
    const key = document.getElementById("key").value;
    const filename = document.getElementById("filename").value || "output.wav";

    const res = await fetch(BASE_URL + "/encode", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text, key, filename})
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    document.getElementById("audio").src = url;
}

/* DECODE */
async function decode() {
    const file = document.getElementById("file").files[0];

    const form = new FormData();
    form.append("file", file);

    const res = await fetch(BASE_URL + "/decode", {
        method: "POST",
        body: form
    });

    const data = await res.json();
    document.getElementById("out").value = data.decoded;
}
</script>

</body>
</html>
